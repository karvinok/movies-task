name: Build and Deploy to Telegram

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Get APK file name
        id: apk_name
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_file=$(basename $APK_PATH)" >> $GITHUB_OUTPUT

      - name: Send APK to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: |
          APK_PATH="${{ steps.apk_name.outputs.apk_path }}"
          APK_FILE="${{ steps.apk_name.outputs.apk_file }}"

          # Get commit info for caption
          COMMIT_MSG=$(git log -1 --pretty=%B)
          COMMIT_SHA=$(git rev-parse --short HEAD)
          BRANCH_NAME=${GITHUB_REF#refs/heads/}

          # Create caption
          CAPTION=$(cat <<EOF
          Movies App - New Build

          File: $APK_FILE
          Branch: $BRANCH_NAME
          Commit: $COMMIT_SHA
          Message: $COMMIT_MSG

          Built by GitHub Actions
          EOF
          )

          # Send document to Telegram
          curl -F "chat_id=${CHANNEL_ID}" \
               -F "document=@${APK_PATH}" \
               -F "caption=${CAPTION}" \
               "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ${{ steps.apk_name.outputs.apk_path }}
          retention-days: 30
